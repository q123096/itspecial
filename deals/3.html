<script>
(function(){
  var el=document.getElementById("pc3");
  if(!el)return;
  var D=["2026-07-01", "2026-07-02", "2026-07-03", "2026-07-04", "2026-07-05", "2026-07-06", "2026-07-07"];
  var L=[379890, 785990, 785990, 955000, 785990, 955000, 379890];
  var H=[0, 0, 0, 0, 0, 0, 0];
  var hasH=false;
  var sp=379890;
  var ds=[{label:"최저가",data:L,borderColor:"#5B6BF8",backgroundColor:"rgba(91,107,248,0.08)",tension:0.3,fill:true,pointRadius:4,pointHoverRadius:6,pointBackgroundColor:"#5B6BF8"}];
  if(hasH)ds.push({label:"최고가",data:H,borderColor:"#adb5bd",borderDash:[5,5],tension:0.3,fill:false,pointRadius:2,pointHoverRadius:4});
  var saleLine={id:"sl",afterDraw:function(c){
    var ys=c.scales.y,xs=c.scales.x;
    if(!ys||sp<=0)return;
    var y=ys.getPixelForValue(sp),cx=c.ctx;
    cx.save();cx.beginPath();cx.setLineDash([6,4]);
    cx.strokeStyle="#FF6B35";cx.lineWidth=1.5;
    cx.moveTo(xs.left,y);cx.lineTo(xs.right,y);cx.stroke();
    cx.fillStyle="#FF6B35";cx.font="bold 11px sans-serif";
    cx.fillText("현재특가",xs.right-56,y-4);
    cx.restore();
  }};
  new Chart(el,{
    type:"line",
    data:{labels:D,datasets:ds},
    options:{
      responsive:true,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{display:hasH,position:"top",labels:{font:{size:12}}},
        tooltip:{callbacks:{label:function(c){
          if(!c.parsed.y)return null;
          return c.dataset.label+": "+c.parsed.y.toLocaleString("ko-KR")+"원";
        }}}
      },
      scales:{
        x:{ticks:{font:{size:11},maxRotation:30,maxTicksLimit:7}},
        y:{ticks:{callback:function(v){
          return v>=10000?(v/10000).toFixed(1)+"만":v.toLocaleString("ko-KR");
        },font:{size:11}}}
      }
    },
    plugins:[saleLine]
  });
})();
</script>
