name: 딜 자동 발굴 → 파트너스 링크 → 배포

on:
  push:
    branches: [main]
  schedule:
    # 한국시간 오전 9시 / 오후 3시 / 오후 9시
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:   # 수동 실행 (GitHub Actions 탭에서 버튼 클릭)
    inputs:
      send_test_alert:
        description: '📧 테스트 이메일 발송 (기존 딜로 구독자에게 발송)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 사용 (deprecation 경고 해결)

jobs:
  # ════════════════════════════════════════
  # 1단계: 새 딜 자동 발굴
  #   - 쿠팡 API 키워드 검색 + 베스트셀러
  #   - 뽐뿌 RSS 파싱
  #   - 만료 딜 자동 제거
  # ════════════════════════════════════════
  discover:
    runs-on: ubuntu-latest
    continue-on-error: true   # API 키 미설정 시에도 워크플로 중단 방지
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 딜 자동 발굴 실행
        env:
          COUPANG_ACCESS_KEY:   ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY:   ${{ secrets.COUPANG_SECRET_KEY }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEND_TEST_ALERT:      ${{ github.event.inputs.send_test_alert }}
        run: python scripts/discover_deals.py

      - id: check
        run: |
          if git diff --quiet data/deals.json data/price_history.json data/msrp.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "변경사항:"
            git diff --stat data/deals.json data/price_history.json data/msrp.json
          fi

      - name: 변경된 데이터 파일 커밋 & 푸시
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals.json data/price_history.json data/msrp.json
          git commit -m "🤖 딜 자동 발굴 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push

  # ════════════════════════════════════════
  # 2단계: 파트너스 링크 자동 생성
  #   - affiliateUrl 비어있는 딜에 링크 삽입
  #   - 쿠팡/11번가/G마켓 각각 처리
  # ════════════════════════════════════════
  affiliate-links:
    runs-on: ubuntu-latest
    needs: discover
    if: always()             # discover 실패해도 반드시 실행
    continue-on-error: true  # API 키 미설정 시에도 워크플로 중단 방지
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 파트너스 링크 자동 생성
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          ST11_API_KEY:       ${{ secrets.ST11_API_KEY }}
        run: python scripts/update_affiliate_links.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 딜 자동 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git push
          else
            echo "변경사항 없음 — 커밋 스킵"
          fi

  # ════════════════════════════════════════
  # 3단계: 제품 스펙 자동 보강
  #   - Icecat 공식 카탈로그에서 스펙 조회
  #   - 없으면 Naver Shopping API 폴백
  #   - 결과를 Supabase products 테이블에 저장
  #   - 이미 있는 제품은 스킵 (1회만 조회)
  # ════════════════════════════════════════
  enrich-products:
    runs-on: ubuntu-latest
    needs: affiliate-links
    if: always()            # affiliate-links 실패해도 실행
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 제품 스펙 보강 실행
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ICECAT_USERNAME:      ${{ secrets.ICECAT_USERNAME }}
          ICECAT_API_KEY:       ${{ secrets.ICECAT_API_KEY }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/enrich_products.py

  # ════════════════════════════════════════
  # GitHub Pages 배포 트리거
  #   - main 브랜치 push 시 자동 배포됨
  #   - 별도 설정 불필요 (GitHub Pages가 처리)
  # ════════════════════════════════════════
