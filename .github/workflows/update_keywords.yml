name: 최신 기기 키워드 자동 트래킹

on:
  schedule:
    # 매주 월요일 KST 06:00 (UTC 일요일 21:00) — 주 1회 신규 기기 탐색
    - cron: '0 21 * * 0'
  workflow_dispatch:   # 수동 실행 가능

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-keywords:
    runs-on: ubuntu-latest
    continue-on-error: true   # 오류 시에도 워크플로 중단 없이 진행
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 최신 기기 키워드 업데이트
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/update_search_keywords.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/search_config.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 신규 기기 키워드 자동 추가 $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
            git push
            echo "✅ 새 키워드 커밋 완료"
          else
            echo "ℹ️  변경사항 없음 — 커밋 스킵"
          fi
